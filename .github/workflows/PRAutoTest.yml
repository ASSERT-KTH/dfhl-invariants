name: PRAutoTest
on:
  pull_request:
    paths:
      - 'src/**/*_exp.sol'

env:
  FOUNDRY_PROFILE: ci
  MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}

jobs:
  check:
    strategy:
      fail-fast: true
    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1
        with:
          version: nightly

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Run tests for changed exploits
        id: test
        run: |
          set -e
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"

          keys=$(git diff --name-only "$base_sha" "$head_sha" \
            | grep '_exp\.sol$' \
            | grep '^src/' \
            | grep -v '^src/test/' \
            | sed 's|^src/||' \
            | cut -d'/' -f1 \
            | sort -u)

          if [ -z "$keys" ]; then
            echo "No case exploit files changed."
            exit 0
          fi

          for key in $keys; do
            echo "::group::Testing $key (original)"
            python3 run_test.py "$key" original
            echo "::endgroup::"

            echo "::group::Testing $key (patch)"
            python3 run_test.py "$key" patch
            echo "::endgroup::"
          done
